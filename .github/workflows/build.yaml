name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Dependencies
        run: |
          go install github.com/akavel/rsrc@latest
          go mod tidy
          sudo apt-get install -y libx11-dev zip

      - name: Build Windows
        run: |
          rsrc -ico logo.ico -o rsrc.syso
          GOOS=windows GOARCH=amd64 go build \
          -ldflags="-X main.Version=${{ github.ref_name }}" \
          -o clipsync-windows-amd64.exe .

      - name: Build Linux
        run: |
          rm rsrc.syso
          GOOS=linux GOARCH=amd64 go build \
          -ldflags="-X main.Version=${{ github.ref_name }}" \
          -o clipsync-linux-amd64 .

      - name: Build macOS
        run: |
          GOOS=darwin GOARCH=amd64 go build \
          -ldflags="-X main.Version=${{ github.ref_name }}" \
          -o clipsync-macos-amd64 .

      - name: Compress
        run: |
          zip clipsync-windows-amd64.zip clipsync-windows-amd64.exe
          tar -czf clipsync-linux-amd64.tar.gz clipsync-linux-amd64
          tar -czf clipsync-macos-amd64.tar.gz clipsync-macos-amd64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ClipSync ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            clipsync-windows-amd64.zip
            clipsync-linux-amd64.tar.gz
            clipsync-macos-amd64.tar.gz