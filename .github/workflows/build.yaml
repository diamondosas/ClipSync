name: Build and Release
on:
  push:
    branches: [ "main" ]
    paths:
      - "VERSION"
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    name: Build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cgo: "1"
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            cgo: "0"
          # amd64 — must use macos-13 (Intel); macos-latest is now ARM64
          - goos: darwin
            goarch: amd64
            runner: macos-13
            cgo: "1"
          # arm64 — native build on macos-latest (Apple Silicon)
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            cgo: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Dependencies
        run: |
          if [ "${{ matrix.goos }}" = "linux" ]; then
            sudo apt-get update && sudo apt-get install -y \
              pkg-config \
              libx11-dev libx11-xcb-dev \
              libwayland-dev wayland-protocols \
              libxkbcommon-dev libxkbcommon-x11-dev \
              libvulkan-dev libegl-dev libgles2-mesa-dev \
              libxcursor-dev libxi-dev libxrandr-dev \
              libxinerama-dev libxxf86vm-dev \
              libxfixes-dev
          fi
          if [ "${{ matrix.goos }}" = "windows" ]; then
            # Use goversioninfo instead of rsrc — compatible with Go 1.25 PE linker
            go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
            echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          fi

      - name: Embed Windows Resources
        if: matrix.goos == 'windows'
        run: |
          # goversioninfo reads versioninfo.json and writes resource.syso
          # Create a minimal versioninfo.json if one doesn't exist
          if [ ! -f versioninfo.json ]; then
            VERSION=$(cat VERSION | tr -d '[:space:]')
            cat > versioninfo.json <<EOF
          {
            "FixedFileInfo": {
              "FileVersion": { "Major": 0, "Minor": 0, "Patch": 0, "Build": 0 },
              "ProductVersion": { "Major": 0, "Minor": 0, "Patch": 0, "Build": 0 }
            },
            "IconPath": "assets/logo.ico"
          }
          EOF
          fi
          goversioninfo -icon=assets/logo.ico -o resource.syso

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          # -H windowsgui only makes sense for Windows; strip it on other platforms
          if [ "${{ matrix.goos }}" = "windows" ]; then
            LDFLAGS="-X main.Version=${VERSION} -s -w -H windowsgui"
            OUTPUT="clipsync.exe"
          else
            LDFLAGS="-X main.Version=${VERSION} -s -w"
            OUTPUT="clipsync"
          fi
          go build -ldflags="${LDFLAGS}" -o "${OUTPUT}" .

      - name: Package
        run: |
          ASSET_NAME="clipsync-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${ASSET_NAME}.zip" "clipsync.exe"
            echo "ASSET_PATH=${ASSET_NAME}.zip" >> $GITHUB_ENV
          else
            tar -czf "${ASSET_NAME}.tar.gz" "clipsync"
            echo "ASSET_PATH=${ASSET_NAME}.tar.gz" >> $GITHUB_ENV
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ASSET_PATH }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get Version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
      - name: Delete Old Tags & Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_TAG="${{ steps.version.outputs.tag }}"
          git fetch --tags
          git tag -l | grep -v "^${NEW_TAG}$" | while read old_tag; do
            echo "Removing: $old_tag"
            gh release delete "$old_tag" --yes 2>/dev/null || true
            git push origin --delete "$old_tag" 2>/dev/null || true
          done
      - uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          merge-multiple: true
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            clipsync-*.zip
            clipsync-*.tar.gz